<body class="bg-background text-on-background font-body min-h-screen pb-24">
<!-- TopAppBar - Applied from Shared Components JSON logic -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-4 h-16 bg-white dark:bg-[#0D1117] border-b border-[#E2E5EA] dark:border-gray-800">
<div class="flex items-center gap-4">
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-gray-100 transition-transform active:scale-95">
<span class="material-symbols-outlined text-[#0D1117]">arrow_back</span>
</button>
<h1 class="text-xl font-semibold text-[#0D1117]">Nouvelle dépense</h1>
</div>
<div class="flex items-center">
<img class="h-8 w-auto grayscale contrast-125" data-alt="Small SOUIGAT corporate logo branding" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDeek_MD77o1tHBrZTukotoclW4893VHsu-8J7oFWiisW_ORflqWtIa9yA-G4L4SxAlMf4QSmMI6SRTbPP1qxqODQViUZk4n_PaECUgLf2ty6M_34vojr11DwYjC3MTMTMf4Rxs2ToU2QduaxQx5-r14dwsw7zfcFHqbOgL-6Eisw4iwb3W2scH_7NDRU-QX2z_SNYw1dvndDLamSP5XshYuPvIpeWj3cujVadmCW5HkyOWkHxgdcmU88yBSJFsVV-40jYpnFBWuhY"/>
</div>
</header>
<main class="pt-20 px-4 max-w-lg mx-auto">
<!-- Hero: Amount Input Field -->
<section class="mt-8 mb-12 flex flex-col items-center">
<span class="text-xs font-medium uppercase tracking-wider text-secondary mb-2">Montant de la dépense</span>
<div class="relative flex items-baseline justify-center w-full">
<input class="w-full text-center bg-transparent border-none focus:ring-0 text-[40px] font-bold mono-numeric text-on-surface" placeholder="0.00" type="text"/>
<span class="ml-2 text-2xl font-bold text-primary-container">DZD</span>
</div>
<div class="h-1 w-24 bg-primary-container/20 rounded-full mt-2"></div>
</section>
<!-- Category Grid: Tactical Cards -->
<section class="mb-12">
<h2 class="text-sm font-bold text-secondary uppercase tracking-widest mb-4">Catégorie</h2>
<div class="grid grid-cols-3 gap-3">
<!-- Card 1 -->
<button class="flex flex-col items-center justify-center p-4 aspect-square bg-surface-container-lowest border border-outline-variant/20 rounded-xl hover:bg-primary-container hover:text-white transition-all group shadow-sm">
<span class="material-symbols-outlined text-3xl mb-2 text-primary-container group-hover:text-white" data-icon="local_gas_station">local_gas_station</span>
<span class="text-xs font-semibold text-center">Carburant</span>
</button>
<!-- Card 2 -->
<button class="flex flex-col items-center justify-center p-4 aspect-square bg-surface-container-lowest border border-outline-variant/20 rounded-xl hover:bg-primary-container hover:text-white transition-all group shadow-sm">
<span class="material-symbols-outlined text-3xl mb-2 text-primary-container group-hover:text-white" data-icon="restaurant">restaurant</span>
<span class="text-xs font-semibold text-center">Restaurant</span>
</button>
<!-- Card 3 -->
<button class="flex flex-col items-center justify-center p-4 aspect-square bg-surface-container-lowest border border-outline-variant/20 rounded-xl hover:bg-primary-container hover:text-white transition-all group shadow-sm">
<span class="material-symbols-outlined text-3xl mb-2 text-primary-container group-hover:text-white" data-icon="build">build</span>
<span class="text-xs font-semibold text-center">Entretien</span>
</button>
<!-- Card 4 -->
<button class="flex flex-col items-center justify-center p-4 aspect-square bg-surface-container-lowest border border-outline-variant/20 rounded-xl hover:bg-primary-container hover:text-white transition-all group shadow-sm">
<span class="material-symbols-outlined text-3xl mb-2 text-primary-container group-hover:text-white" data-icon="toll">toll</span>
<span class="text-xs font-semibold text-center">Péage</span>
</button>
<!-- Card 5 -->
<button class="flex flex-col items-center justify-center p-4 aspect-square bg-surface-container-lowest border border-outline-variant/20 rounded-xl hover:bg-primary-container hover:text-white transition-all group shadow-sm">
<span class="material-symbols-outlined text-3xl mb-2 text-primary-container group-hover:text-white" data-icon="more_horiz">more_horiz</span>
<span class="text-xs font-semibold text-center">Autres</span>
</button>
<!-- Empty placeholder for 3rd column alignment if needed or just 5 items -->
</div>
</section>
<!-- Description Field -->
<section class="mb-8">
<div class="flex justify-between items-end mb-2">
<label class="text-sm font-bold text-secondary uppercase tracking-widest">Description</label>
<span class="text-[10px] font-mono text-outline">0/200</span>
</div>
<div class="relative">
<textarea class="w-full p-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl focus:ring-2 focus:ring-primary-container focus:border-transparent resize-none text-on-surface text-sm" placeholder="Ajouter des détails sur la dépense..." rows="4"></textarea>
</div>
</section>
<!-- Receipt Upload (Extra tactical element) -->
<section class="mb-12">
<button class="w-full py-4 flex items-center justify-center gap-3 border-2 border-dashed border-outline-variant rounded-xl text-secondary hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined" data-icon="add_a_photo">add_a_photo</span>
<span class="text-sm font-semibold uppercase tracking-wide">Prendre en photo le reçu</span>
</button>
</section>
<!-- Submit Button -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-white/80 backdrop-blur-md border-t border-outline-variant/10">
<button class="w-full bg-primary-container text-white py-4 rounded-full font-bold uppercase tracking-[0.1em] shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="save">save</span>
                Enregistrer la dépense
            </button>
</div>
</main>
<!-- Branding Footer / Floating Logo -->
<div class="flex justify-center mt-8 pb-32 opacity-20 grayscale pointer-events-none">
<img class="h-12 w-auto" data-alt="Full SOUIGAT brand logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCmHlXSgMJANnPPYCoOkypImtMEsq2Mp2CFJVk3TIS45YGielzBB0vELXkotXyx01VHw9xEkNJ568RCBcCBv6ekzDdIpHUMsYCevC2uo-RvUpUTL3PciQH1zUKR8MBBIdMCAm5vKoQw-40PneRA0yZBPQoUF05Qkj509ppVBJWIF4imTodnEqGuj_4vUM615BCpyOlUXyo-YcLeGdxDemaQsvujuakf4gY3g59ykhsPE8F-jZfbYXBxRN_-8byKHZuAveDHPcehEhY"/>
