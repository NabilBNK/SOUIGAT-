<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#92efc7",
              "secondary-fixed": "#d9e3f4",
              "error-container": "#ffdad6",
              "tertiary-fixed": "#97f5cc",
              "on-tertiary": "#ffffff",
              "on-primary-container": "#d4dcff",
              "surface-bright": "#f7f9fc",
              "on-tertiary-fixed": "#002115",
              "primary": "#003fb1",
              "outline-variant": "#c3c5d7",
              "error": "#ba1a1a",
              "on-tertiary-fixed-variant": "#00513a",
              "surface-tint": "#1353d8",
              "on-primary": "#ffffff",
              "primary-fixed-dim": "#b5c4ff",
              "tertiary-fixed-dim": "#7bd8b1",
              "inverse-surface": "#2d3133",
              "on-surface": "#191c1e",
              "on-secondary-fixed-variant": "#3e4755",
              "on-primary-fixed": "#00174d",
              "surface-container": "#eceef1",
              "on-secondary-fixed": "#121c28",
              "primary-fixed": "#dbe1ff",
              "on-error": "#ffffff",
              "surface-container-low": "#f2f4f7",
              "secondary-fixed-dim": "#bdc7d8",
              "secondary-container": "#d6e0f1",
              "primary-container": "#1a56db",
              "on-error-container": "#93000a",
              "surface": "#f7f9fc",
              "background": "#f7f9fc",
              "on-secondary": "#ffffff",
              "on-surface-variant": "#434654",
              "tertiary-container": "#006f50",
              "on-secondary-container": "#596372",
              "outline": "#737686",
              "surface-variant": "#e0e3e6",
              "secondary": "#555f6d",
              "surface-dim": "#d8dadd",
              "tertiary": "#00543c",
              "surface-container-lowest": "#ffffff",
              "surface-container-highest": "#e0e3e6",
              "surface-container-high": "#e6e8eb",
              "inverse-on-surface": "#eff1f4",
              "inverse-primary": "#b5c4ff",
              "on-primary-fixed-variant": "#003dab",
              "on-background": "#191c1e"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"],
              "mono": ["JetBrains Mono"]
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#F0F2F5] font-body text-on-surface h-screen overflow-hidden flex flex-col">
<!-- Top Panel: 40% height -->
<header class="h-[40%] bg-[#0D1117] flex flex-col justify-center items-center px-6 relative">
<div class="text-center">
<h1 class="text-white text-[36px] font-[900] tracking-tight font-headline">SOUIGAT</h1>
<p class="text-gray-400 text-[14px] font-medium tracking-wide mt-1 uppercase">Opérations terrain</p>
</div>
<!-- Subtle horizontal rule -->
<div class="absolute bottom-12 w-16 h-[2px] bg-primary-container/30"></div>
<!-- Decorative texture/gradient hint for the Monolith aesthetic -->
<div class="absolute top-0 right-0 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl -mr-32 -mt-32"></div>
</header>
<!-- Bottom Panel: 60% height sliding up -->
<main class="h-[60%] bg-surface-container-lowest rounded-t-[32px] shadow-2xl z-10 -mt-8 flex flex-col px-8 pt-10">
<div class="max-w-md mx-auto w-full">
<h2 class="text-[22px] font-semibold text-on-surface mb-8">Connexion</h2>
<form class="space-y-6">
<!-- Phone Field -->
<div class="space-y-1.5">
<label class="text-xs font-medium text-on-surface-variant tracking-wider uppercase pl-1">Téléphone</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="phone">phone</span>
</div>
<input class="block w-full h-[56px] pl-12 pr-4 bg-surface-container-lowest border border-outline-variant/40 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary placeholder:text-outline-variant font-mono transition-all duration-200" placeholder="0X XX XX XX XX" type="tel"/>
</div>
</div>
<!-- Password Field with Error State -->
<div class="space-y-1.5">
<label class="text-xs font-medium text-on-surface-variant tracking-wider uppercase pl-1">Mot de passe</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full h-[56px] pl-12 pr-12 bg-surface-container-lowest border border-error/50 rounded-xl focus:ring-2 focus:ring-error focus:border-error font-mono transition-all duration-200" type="password" value="••••••••"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="visibility_off">visibility_off</span>
</div>
</div>
<!-- Inline Error Text -->
<p class="text-[#B91C1C] text-xs font-medium pl-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="error">error</span>
                        Identifiants incorrects. Veuillez réessayer.
                    </p>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full h-[52px] bg-primary-container text-white font-bold rounded-xl shadow-lg shadow-primary-container/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Se connecter
                        <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Auxiliary links -->
<div class="flex justify-between items-center pt-2">
<button class="text-xs font-medium text-primary hover:underline" type="button">Mot de passe oublié ?</button>
<span class="text-[10px] font-mono text-outline-variant tracking-tighter">V.2.4.0-PRO</span>
</div>
</form>
</div>
<!-- System Footer hint -->
<footer class="mt-auto pb-8 text-center">
<p class="text-[11px] text-outline-variant uppercase tracking-widest font-medium">Propulsé par le système de gestion SOUIGAT</p>
</footer>
</main>
<!-- Support Background for the "Slide Up" effect visual gap -->
<div class="fixed inset-0 -z-10 bg-[#F0F2F5]"></div>
</body></html>
