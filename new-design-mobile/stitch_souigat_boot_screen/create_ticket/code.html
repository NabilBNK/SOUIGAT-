<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#f2f4f7",
              "surface-container-highest": "#e0e3e6",
              "on-secondary-container": "#596372",
              "primary-container": "#1a56db",
              "on-primary-fixed-variant": "#003dab",
              "on-background": "#191c1e",
              "on-tertiary-fixed-variant": "#00513a",
              "primary-fixed": "#dbe1ff",
              "secondary": "#555f6d",
              "on-error-container": "#93000a",
              "inverse-surface": "#2d3133",
              "secondary-fixed-dim": "#bdc7d8",
              "on-primary": "#ffffff",
              "on-surface": "#191c1e",
              "background": "#f7f9fc",
              "tertiary-container": "#006f50",
              "outline": "#737686",
              "surface": "#f7f9fc",
              "on-secondary": "#ffffff",
              "secondary-container": "#d6e0f1",
              "on-tertiary-container": "#92efc7",
              "on-secondary-fixed": "#121c28",
              "tertiary": "#00543c",
              "error": "#ba1a1a",
              "on-tertiary": "#ffffff",
              "surface-container-high": "#e6e8eb",
              "surface-container": "#eceef1",
              "tertiary-fixed": "#97f5cc",
              "inverse-primary": "#b5c4ff",
              "secondary-fixed": "#d9e3f4",
              "tertiary-fixed-dim": "#7bd8b1",
              "on-primary-fixed": "#00174d",
              "error-container": "#ffdad6",
              "surface-variant": "#e0e3e6",
              "outline-variant": "#c3c5d7",
              "on-tertiary-fixed": "#002115",
              "on-primary-container": "#d4dcff",
              "surface-bright": "#f7f9fc",
              "primary-fixed-dim": "#b5c4ff",
              "surface-tint": "#1353d8",
              "inverse-on-surface": "#eff1f4",
              "primary": "#003fb1",
              "on-error": "#ffffff",
              "surface-dim": "#d8dadd",
              "on-surface-variant": "#434654",
              "on-secondary-fixed-variant": "#3e4755"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"],
              "mono": ["JetBrains Mono"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-4 h-16 bg-white dark:bg-[#0D1117] border-b border-[#E2E5EA] dark:border-gray-800">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-xl font-semibold text-on-surface">Nouveau billet</h1>
</div>
<div class="flex items-center gap-2">
<img alt="Logo SOUIGAT" class="h-8 w-auto" data-alt="Official logo of Souigat transportation service" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAY_KRll0BcPRKSNldkDopaQAdd9vDOzktjZovRATAGmsS4dkmcmEeDKZZ9Fc_rZfYLVPgWEzhDueqL-PUkwqXOYduo9GkBZJE9a7Q1YWZRxW6ESFseanZ5YSOX6qqxAdEVEGhGe1joJ_-UNjXWW8T-P0GmIA92sQ_Mc2CZRe7-raL-p5qPrp_TWU1n2VOn2Ok0U59ZWn-hWEiCitZr54vwlSx1sRLjiXZmlwYkA_CbZcN7NEqFTc1OuyzG3a7n6Haz0yIPW26u-0M"/>
<button class="w-10 h-10 flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-transform active:scale-95">
<span class="material-symbols-outlined text-[#1A56DB] dark:text-[#3B82F6]">sync</span>
</button>
</div>
</header>
<main class="pt-20 pb-32 px-4 max-w-lg mx-auto space-y-6">
<!-- Trip Summary Card -->
<section class="bg-surface-container-lowest p-4 rounded-xl border border-outline-variant/20 shadow-sm">
<div class="flex justify-between items-start">
<div class="space-y-1">
<div class="flex items-center gap-2">
<span class="text-xs font-medium text-secondary uppercase tracking-wider">Ligne Actuelle</span>
<span class="bg-primary-container/10 text-primary text-[10px] font-bold px-2 py-0.5 rounded uppercase">Direct</span>
</div>
<h2 class="text-lg font-bold text-on-surface leading-tight">Alger (Gare Centrale)</h2>
<div class="flex items-center gap-2 text-on-secondary-container">
<span class="material-symbols-outlined text-sm">arrow_downward</span>
<span class="text-md font-medium">Oran (El Bahia)</span>
</div>
</div>
<div class="text-right">
<span class="block text-[10px] font-bold text-secondary uppercase tracking-tighter">Bus No</span>
<span class="font-mono text-lg font-bold text-primary">04-22</span>
</div>
</div>
</section>
<!-- Category Selector -->
<div class="flex p-1 bg-surface-container-high rounded-xl">
<button class="flex-1 py-2.5 text-sm font-bold rounded-lg bg-white shadow-sm text-primary transition-all">
                Passager
            </button>
<button class="flex-1 py-2.5 text-sm font-bold text-on-secondary-container hover:bg-surface-container-low transition-all">
                Colis
            </button>
</div>
<!-- Form Section -->
<div class="space-y-8">
<!-- Passenger Count -->
<div class="space-y-3">
<label class="text-xs font-bold text-secondary uppercase tracking-widest px-1">Nombre de places</label>
<div class="flex items-center justify-between bg-surface-container-low p-2 rounded-xl border border-outline-variant/10">
<button class="w-14 h-14 flex items-center justify-center bg-white rounded-lg shadow-sm border border-outline-variant/20 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-primary">remove</span>
</button>
<div class="text-center">
<span class="font-mono text-4xl font-black text-on-surface tracking-tighter">01</span>
</div>
<button class="w-14 h-14 flex items-center justify-center bg-primary text-white rounded-lg shadow-md active:scale-90 transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Price Input -->
<div class="space-y-3">
<div class="flex justify-between items-end px-1">
<label class="text-xs font-bold text-secondary uppercase tracking-widest">Prix Unitaire</label>
<span class="bg-tertiary-fixed text-on-tertiary-fixed-variant text-[10px] font-bold px-2 py-1 rounded-sm uppercase tracking-tighter">Tarif conseillé</span>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-2 border-outline-variant/20 rounded-xl py-4 px-4 font-mono text-2xl font-bold text-on-surface focus:border-primary focus:ring-0 transition-all text-right pr-16" type="text" value="850.00"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 font-mono font-bold text-secondary">DZD</span>
</div>
</div>
<!-- Stop Selection -->
<div class="space-y-3">
<label class="text-xs font-bold text-secondary uppercase tracking-widest px-1">Arrêt de destination</label>
<div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
<button class="flex-none px-4 py-2 bg-primary-container text-white rounded-full text-sm font-bold shadow-sm whitespace-nowrap">Oran (Terminus)</button>
<button class="flex-none px-4 py-2 bg-white border border-outline-variant/30 text-on-surface rounded-full text-sm font-medium whitespace-nowrap">Chlef</button>
<button class="flex-none px-4 py-2 bg-white border border-outline-variant/30 text-on-surface rounded-full text-sm font-medium whitespace-nowrap">Relizane</button>
<button class="flex-none px-4 py-2 bg-white border border-outline-variant/30 text-on-surface rounded-full text-sm font-medium whitespace-nowrap">Mostaganem</button>
</div>
</div>
<!-- Payment Method -->
<div class="space-y-3">
<label class="text-xs font-bold text-secondary uppercase tracking-widest px-1">Mode de paiement</label>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 p-4 rounded-xl border-2 border-primary bg-primary/5 text-primary">
<span class="material-symbols-outlined">payments</span>
<span class="font-bold text-sm">Espèces</span>
</button>
<button class="flex items-center justify-center gap-2 p-4 rounded-xl border-2 border-outline-variant/20 bg-white text-secondary">
<span class="material-symbols-outlined">credit_card</span>
<span class="font-bold text-sm">Prépayé</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer Action -->
<footer class="fixed bottom-0 w-full bg-white border-t border-outline-variant/30 px-4 py-4 z-50">
<div class="max-w-lg mx-auto flex items-center justify-between gap-4">
<div class="flex flex-col">
<span class="text-[10px] font-bold text-secondary uppercase tracking-widest">Total à payer</span>
<span class="font-mono text-2xl font-black text-on-surface">850.00<span class="text-sm ml-1 text-secondary">DZD</span></span>
</div>
<button class="flex-1 bg-primary text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">confirmation_number</span>
                Créer billet
            </button>
</div>
</footer>
</body></html>
