<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SOUIGAT - Create Ticket</title>
<!-- Fonts and Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1e293b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen flex flex-col relative pb-32">
<!-- Header Section -->
<header class="sticky top-0 z-20 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md pt-safe-top transition-colors duration-200">
<!-- Top App Bar -->
<div class="flex items-center px-4 py-3 justify-between">
<button aria-label="Go back" class="flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors text-slate-900 dark:text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Create Ticket</h1>
</div>
<!-- Segmented Control -->
<div class="px-4 pb-4">
<div class="flex h-12 w-full items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg relative z-10">
<input checked="" class="peer sr-only" name="ticket-type" type="radio" value="Passenger"/>
<div class="absolute inset-0 rounded-lg bg-white dark:bg-primary shadow-sm opacity-0 peer-checked:opacity-100 transition-all duration-200"></div>
<span class="relative z-10 text-sm font-semibold text-slate-600 dark:text-slate-400 peer-checked:text-primary dark:peer-checked:text-white transition-colors duration-200 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">person</span>
                        Passenger
                    </span>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg relative z-10">
<input class="peer sr-only" name="ticket-type" type="radio" value="Cargo"/>
<div class="absolute inset-0 rounded-lg bg-white dark:bg-primary shadow-sm opacity-0 peer-checked:opacity-100 transition-all duration-200"></div>
<span class="relative z-10 text-sm font-semibold text-slate-600 dark:text-slate-400 peer-checked:text-primary dark:peer-checked:text-white transition-colors duration-200 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">package_2</span>
                        Cargo
                    </span>
</label>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 px-4 w-full max-w-lg mx-auto space-y-4">
<!-- Route Card -->
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-2 mb-4 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-primary">alt_route</span>
<h2 class="text-sm font-bold uppercase tracking-wider">Route Details</h2>
</div>
<div class="relative flex flex-col gap-4">
<!-- Visual Connection Line -->
<div class="absolute left-[19px] top-10 bottom-10 w-0.5 border-l-2 border-dashed border-slate-300 dark:border-slate-600 z-0"></div>
<!-- Source Field -->
<div class="relative z-10 group">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 ml-1">From</label>
<div class="relative">
<div class="absolute left-3 top-1/2 -translate-y-1/2 flex items-center justify-center text-primary">
<span class="material-symbols-outlined fill-current" style="font-variation-settings: 'FILL' 1;">trip_origin</span>
</div>
<select class="w-full h-14 pl-12 pr-10 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-base font-medium text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary appearance-none cursor-pointer transition-colors">
<option disabled="" value="">Select Source</option>
<option selected="" value="algiers">Algiers (Gare Routière)</option>
<option value="oran">Oran</option>
<option value="constantine">Constantine</option>
</select>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Destination Field -->
<div class="relative z-10 group">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 ml-1">To</label>
<div class="relative">
<div class="absolute left-3 top-1/2 -translate-y-1/2 flex items-center justify-center text-primary">
<span class="material-symbols-outlined fill-current" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<select class="w-full h-14 pl-12 pr-10 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-base font-medium text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary appearance-none cursor-pointer transition-colors">
<option disabled="" selected="" value="">Select Destination</option>
<option value="algiers">Algiers</option>
<option value="oran">Oran</option>
<option value="constantine">Constantine</option>
<option value="setif">Sétif</option>
</select>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</div>
</div>
<!-- Passenger Info Card -->
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-2 mb-4 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-primary">badge</span>
<h2 class="text-sm font-bold uppercase tracking-wider">Passenger Info</h2>
</div>
<div class="space-y-4">
<!-- Name Input -->
<div>
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 ml-1">Full Name</label>
<input class="w-full h-14 px-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-base text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors" placeholder="Enter passenger name" type="text"/>
</div>
<!-- Seat Input (Optional) -->
<div>
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 ml-1">Seat Number <span class="text-slate-400 font-normal">(Optional)</span></label>
<div class="relative">
<div class="absolute left-3 top-1/2 -translate-y-1/2 flex items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-[20px]">event_seat</span>
</div>
<input class="w-full h-14 pl-10 pr-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-base text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors" placeholder="--" type="number"/>
</div>
</div>
</div>
</div>
<!-- Price Summary Display -->
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-800 flex justify-between items-center">
<div>
<p class="text-sm font-medium text-slate-500 dark:text-slate-400">Total Fare</p>
<p class="text-xs text-slate-400 mt-0.5">Standard Class</p>
</div>
<div class="text-right">
<span class="block text-3xl font-extrabold text-primary tracking-tight">1,200</span>
<span class="text-sm font-bold text-slate-400">DZD</span>
</div>
</div>
</main>
<!-- Sticky Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 right-0 z-30 bg-white dark:bg-surface-dark border-t border-slate-100 dark:border-slate-800 px-4 py-4 pb-8 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] dark:shadow-none">
<div class="max-w-lg mx-auto">
<!-- Printer Status -->
<div class="flex items-center justify-center gap-2 mb-3">
<div class="flex items-center gap-1.5 px-3 py-1 bg-emerald-50 dark:bg-emerald-900/30 rounded-full border border-emerald-100 dark:border-emerald-800/50">
<span class="material-symbols-outlined text-[16px] text-emerald-600 dark:text-emerald-400">bluetooth_connected</span>
<span class="text-xs font-medium text-emerald-700 dark:text-emerald-400">Printer Ready (POS-80)</span>
</div>
</div>
<!-- Print Button -->
<button class="w-full h-14 bg-primary hover:bg-blue-700 active:bg-blue-800 text-white rounded-xl font-semibold text-lg shadow-lg shadow-blue-500/30 flex items-center justify-center gap-3 transition-all transform active:scale-[0.98]">
<span class="material-symbols-outlined">print</span>
                Print Ticket
            </button>
</div>
</footer>
</body></html>
